<!DOCTYPE html>
<html>
<body>
<h1>Админ</h1>
<button onclick="load()">Обновить</button>
<div id="data"></div>

<script>
async function load(){
const res=await fetch('/api/appointments');
const data=await res.json();
document.getElementById('data').innerHTML=
data.map(a=>`<p>${a.phone} | ${a.service} | ${a.date} | ${a.master}</p>`).join('');
}
</script>
</body>
</html>
