<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — SWAGA Salon</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <a href="/" class="logo">✂️ SWAGA Salon</a>
  <div class="nav-links">
    <a href="/login.html">Войти</a>
  </div>
</nav>

<div class="form-container">
  <h2>Создать аккаунт</h2>
  <p class="subtitle">Зарегистрируйтесь для онлайн записи</p>

  <div id="error" class="alert alert-error"></div>
  <div id="success" class="alert alert-success"></div>

  <form id="registerForm">
    <div class="form-group">
      <label for="name">Ваше имя</label>
      <input type="text" id="name" placeholder="Иван Иванов" required>
    </div>
    <div class="form-group">
      <label for="phone">Номер телефона</label>
      <input type="tel" id="phone" placeholder="+79001234567" required>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary form-submit">Зарегистрироваться</button>
  </form>

  <div class="form-footer">
    Уже есть аккаунт? <a href="/login.html">Войти</a>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    Utils.hideError('error');
    Utils.hideError('success');
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    try {
      const data = await api.register({ name, phone, password });
      Auth.save(data.user, data.token);
      window.location.href = '/client.html';
    } catch (err) {
      Utils.showError('error', err.message);
    }
  });
</script>
</body>
</html>
