<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Салон</title></head>
<body>

<h1>Салон красоты</h1>

<input id="phone" placeholder="Телефон">
<button onclick="login()">Войти</button>

<h2>Запись</h2>
<input id="service" placeholder="Услуга">
<input id="date" type="date">
<button onclick="book()">Записаться</button>

<script>
let user=null;

async function login(){
const phone=document.getElementById('phone').value;
const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
user=await res.json();
alert("Вы: "+user.role);
}

async function book(){
if(!user) return alert("Войдите");

await fetch('/api/appointments',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
phone:user.phone,
service:document.getElementById('service').value,
date:document.getElementById('date').value
})
});

alert("Готово");
}
</script>

</body>
</html>
